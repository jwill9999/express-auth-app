name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build image
        run: docker build -t express-auth-app:${{ github.sha }} .

      - name: Save image tarball
        # Only needed on main push for the scan job
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker save express-auth-app:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    needs: build
    # Only run on pushes to main (not on PRs — no registry needed)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write # upload SARIF to GitHub Security tab

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Run Trivy CVE scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # 0.34.1
        with:
          image-ref: express-auth-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0' # report findings without failing the build

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c4a7bc332abaec03596ff2803dd7f3ca3a238975 # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
