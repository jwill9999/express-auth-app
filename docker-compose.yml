services:
  traefik:
    image: traefik:v3.3
    container_name: express-auth-traefik-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.dev.yml:/etc/traefik/traefik.yml:ro
    networks:
      - auth-network

  mongodb:
    image: mongo:7.0
    container_name: express-auth-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: auth_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - auth-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express-auth-app-dev
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - auth-network
    volumes:
      - ./:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`localhost`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      # Security headers middleware
      - "traefik.http.middlewares.secheaders.headers.frameDeny=true"
      - "traefik.http.middlewares.secheaders.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secheaders.headers.browserXssFilter=true"
      - "traefik.http.middlewares.secheaders.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.routers.app.middlewares=secheaders"

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  auth-network:
    driver: bridge
